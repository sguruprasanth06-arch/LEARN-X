<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Student Login</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- HEADER -->

    <header>

        <img src="logo.jpeg" class="logo">

        <h1>Student Login</h1>

        <nav>

            <a href="index.html">Home</a>

            <a href="notes.html">Notes</a>

            <a href="upload.html">Upload</a>

            <a href="faculty.html">Faculty</a>

            <a href="contact.html">Contact</a>

        </nav>

    </header>

    <!-- HERO -->

    <section class="hero">

        <h2>🎓 Welcome Student</h2>

        <p>
            Login to access your dashboard,
            uploads, downloads and profile.
        </p>

    </section>

    <!-- LOGIN FORM -->

    <div class="form-container">

        <h2 style="text-align:center;">
            Login Account
        </h2>

        <br>

        <input
            type="text"
            id="studentName"
            placeholder="Enter Full Name"
        >

        <input
            type="text"
            id="rollNo"
            placeholder="Enter Roll Number"
        >

        <input
            type="text"
            id="department"
            placeholder="Department (CSE, ECE, MECH...)"
        >

        <input
            type="email"
            id="studentEmail"
            placeholder="Enter Email"
        >

        <button
            class="primary-btn"
            onclick="studentLogin()">

            Login

        </button>

    </div>

    <!-- BENEFITS -->

    <section class="stats">

        <div class="stat-box">

            <h2>📚</h2>

            <p>Access Study Materials</p>

        </div>

        <div class="stat-box">

            <h2>📤</h2>

            <p>Upload Notes</p>

        </div>

        <div class="stat-box">

            <h2>⭐</h2>

            <p>Rate Notes</p>

        </div>

        <div class="stat-box">

            <h2>👨‍🎓</h2>

            <p>Personal Dashboard</p>

        </div>

    </section>

    <!-- FOOTER -->

    <footer>

        <h3>College Notes Portal</h3>

        <br>

        <p>
            Learn • Share • Succeed
        </p>

    </footer>

    <script src="script.js"></script>

    <script>

        function studentLogin(){

            const name =
            document.getElementById("studentName").value;

            const roll =
            document.getElementById("rollNo").value;

            const department =
            document.getElementById("department").value;

            const email =
            document.getElementById("studentEmail").value;

            if(
                name === "" ||
                roll === "" ||
                department === "" ||
                email === ""
            ){

                alert("Please fill all fields");

                return;

            }

            localStorage.setItem(
                "studentName",
                name
            );

            localStorage.setItem(
                "rollNo",
                roll
            );

            localStorage.setItem(
                "department",
                department
            );

            localStorage.setItem(
                "studentEmail",
                email
            );

            alert(
                "Login Successful!"
            );

            window.location.href =
            "dashboard.html";

        }

    </script>

</body>

</html>
